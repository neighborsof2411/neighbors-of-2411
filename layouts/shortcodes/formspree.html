<!--
  Formspree contact/signup form shortcode.

  Usage:
    {{</* formspree id="YOUR_FORM_ID" */>}}

  Replace YOUR_FORM_ID with the form ID from your Formspree dashboard
  (https://formspree.io/forms) — the part after "https://formspree.io/f/".
-->
{{ $id := .Get "id" | default "YOUR_FORM_ID" }}
<form class="formspree-form" action="https://formspree.io/f/{{ $id }}" method="POST">
  <div class="form-row">
    <label for="fs-name">Name</label>
    <input id="fs-name" type="text" name="name" autocomplete="name" required>
  </div>

  <div class="form-row">
    <label for="fs-email">Email</label>
    <input id="fs-email" type="email" name="email" autocomplete="email" required>
  </div>

  <div class="form-row">
    <label for="fs-zip">Street / Neighborhood (optional)</label>
    <input id="fs-zip" type="text" name="neighborhood" autocomplete="address-line1">
  </div>

  <div class="form-row">
    <label for="fs-interest">I'm interested in</label>
    <select id="fs-interest" name="interest">
      <option value="email-updates">Email updates only</option>
      <option value="volunteer">Volunteering</option>
      <option value="comment-letter-help">Help writing a comment letter</option>
      <option value="host-event">Hosting/attending an event</option>
      <option value="other">Other</option>
    </select>
  </div>

  <div class="form-row">
    <label for="fs-message">Message (optional)</label>
    <textarea id="fs-message" name="message" rows="4"></textarea>
  </div>

  <!-- Honeypot field to reduce spam; Formspree ignores real submissions with this filled -->
  <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

  <button type="submit" class="button">Sign Up</button>
</form>
