- id: appendix-b
  title: "Appendix B: Health Risk Assessment (HRA)"
  category: appendices
  issues: [air-quality]
  critical: true
  file: /documents/Appendix_B_Health_Risk_Assessment.pdf
  summary: "Models diesel particulate matter emissions and cancer risk. Modeled risk is 9.48 per million against a 10.0 per million significance threshold — a margin of just 0.52."
  lookFor: "Assumes only 5 loading dock doors operating (site plan shows 36). Assumes 50 hrs/year generator use (SCAQMD says 200+ is realistic)."

- id: appendix-k
  title: "Appendix K: Noise and Vibration Impact Analysis"
  category: appendices
  issues: [noise]
  critical: true
  file: /documents/Appendix_K_Noise_and_Vibration_Impact_Analysis.pdf
  summary: "Models nighttime dock noise at 53.6 dBA against a 55.0 dBA significance threshold — a margin of just 0.4 dBA, with no modeling of backup alarms or refrigeration noise."
  lookFor: "Modeling assumptions on pages 1-5 matter more than the final numbers."

- id: appendix-l
  title: "Appendix L: Traffic Impact Analysis (TIA)"
  category: appendices
  issues: [traffic]
  critical: true
  file: /documents/Appendix_L_Traffic_Impact_Analysis.pdf
  summary: "810 net new daily PCE trips. The southern truck driveway is projected to operate at Level of Service E/F — acknowledged as 'unavoidable.' Footnote 1 (page 166) reveals the dock-door discrepancy with Appendix B."
  lookFor: "Page 140: specs. Page 166: Footnote 1 (dock door discrepancy). Page 170: trip generation. Page 178+: LOS analysis."

