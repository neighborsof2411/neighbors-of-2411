- q: "What is the 2411 Glassell warehouse project?"
  a: "The 2411 Glassell warehouse project is a proposed 298,988 SF industrial warehouse and light-manufacturing building at 2411 North Glassell Street in Orange, CA, submitted by Rexford Industrial Realty. It would operate 24 hours a day, 7 days a week, with 36 loading dock doors and 556 net new daily vehicle trips, including approximately 163 truck trips."
  link: "/project/"
  linkText: "See full project specifications →"
- q: "How close is 2411 Glassell to Fletcher Elementary?"
  a: "The 2411 Glassell warehouse site is 0.25 miles (a quarter-mile) from Fletcher Elementary School, and as close as 54 feet from the nearest homes along Fletcher Avenue in Orange, CA."
  link: "/health-evidence/"
  linkText: "Read the health evidence for Fletcher Elementary →"
- q: "When is the Planning Commission hearing for 2411 Glassell?"
  a: "The Planning Commission hearing for the 2411 Glassell warehouse project is tentatively scheduled for August 3 or September 10, 2026. The City of Orange will notify the public 10 days before the date is confirmed."
  link: "/testify/"
  linkText: "How to submit oral public comments at the Planning Commission hearing →"
- q: "What are the environmental impacts of 2411 Glassell?"
  a: "The 2411 Glassell warehouse raises four major environmental concerns: air quality (diesel particulate matter near the significance threshold), noise (nighttime dock operations near the threshold), traffic (an acknowledged Level of Service failure), and land-use incompatibility with nearby homes and a school."
  link: "/issues/"
  linkText: "Read the full environmental issues analysis →"
