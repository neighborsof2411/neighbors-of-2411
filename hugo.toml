baseURL = 'https://2411glassell.com/'
locale = 'en-us'
title = 'Neighbors of 2411'
theme = 'PaperMod'

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

pygmentsUseClasses = true

[minify]
  disableXML = true

[sitemap]
  changefreq = 'weekly'
  priority = 0.5

[services]
  [services.googleAnalytics]
    id = 'GA_MEASUREMENT_ID'

[params]
  env = 'production'
  title = 'Neighbors of 2411'
  description = 'Community opposition to the proposed 298,988 SF warehouse at 2411 North Glassell Street, Orange, CA — 24/7 operations 54 feet from homes and a quarter-mile from Fletcher Elementary School. Learn the issues, review the evidence, and prepare your public comment for the Planning Commission hearing.'
  keywords = ['2411 Glassell', '2411 North Glassell', 'Orange CA warehouse', 'Rexford Industrial', 'Fletcher Elementary', 'Planning Commission hearing', 'CEQA', 'environmental impact report', 'CUP 25-0013', 'ENV25-0002']
  author = 'Neighbors of 2411'

  defaultTheme = 'auto'
  disableThemeToggle = false
  ShowShareButtons = false
  ShowReadingTime = false
  ShowWordCount = false
  ShowPostNavLinks = false
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowRssButtonInSectionTermList = false
  ShowFullTextinRSS = true
  ShowToc = true
  TocOpen = false
  disableSpecial1stPost = true
  disableScrollToTop = false
  hidemeta = true
  hideSummary = false
  showtoc = false
  comments = false

  [[params.socialIcons]]
    name = 'email'
    url = 'mailto:neighborsof2411@gmail.com'

  [params.schema]
    publisherType = 'Organization'

  [params.assets]
    disableHLJS = true

  [params.cover]
    hidden = true
    hiddenInList = true
    hiddenInSingle = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ['title', 'permalink', 'summary', 'content']

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[taxonomies]
  # No tags/categories are used anywhere on this site — disabling avoids
  # generating empty taxonomy list pages that would otherwise show up in
  # the sitemap as thin content.

[menu]
  [[menu.main]]
    identifier = 'home'
    name = 'Home'
    url = '/'
    weight = 10
  [[menu.main]]
    identifier = 'project'
    name = 'Project'
    url = '/project/'
    weight = 20
  [[menu.main]]
    identifier = 'issues'
    name = 'Issues'
    url = '/issues/'
    weight = 30
  [[menu.main]]
    identifier = 'health-evidence'
    name = 'Health Evidence'
    url = '/health-evidence/'
    weight = 40
  [[menu.main]]
    identifier = 'evidence'
    name = 'Evidence'
    url = '/evidence/'
    weight = 50
  [[menu.main]]
    identifier = 'testify'
    name = 'Public Comment'
    url = '/testify/'
    weight = 60
  [[menu.main]]
    identifier = 'resources'
    name = 'Resources'
    url = '/resources/'
    weight = 70

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
